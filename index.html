<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Forms</title>

<link rel="icon" href="./assets/favicon/favicon.ico">
<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
<span class="mf">MF</span> Modern Forms
</div>

<ul class="menu">
<li><a href="#">Home</a></li>
<li><a href="#">Features</a></li>
<li><a href="#">Pricing</a></li>
<li><a href="#">About</a></li>

</ul>

<div class="container">

<div class="form-card">

<h1>Contáctanos</h1>

<p class="subtitle">
Completa el formulario para enviarnos tu mensaje.
</p>

<form>

<label>Nombre Completo</label>
<div class="input-group">
<img src="assets/img/user.svg" class="icon">
<input type="text" placeholder="Juan Pérez">
</div>


<label>Correo Electrónico</label>
<div class="input-group">
<img src="assets/img/mail.svg" class="icon">
<input type="email" placeholder="juan.perez@email.com">
</div>


<label>Número de Teléfono</label>
<div class="input-group">
<img src="assets/img/phone.svg" class="icon">
<input type="tel" placeholder="+34 612 345 678">
</div>


<label>Ciudad / Localidad</label>
<div class="input-group">
<img src="assets/img/location.svg" class="icon">
<input type="text" placeholder="Madrid">
</div>


<label>Tu Mensaje</label>

<textarea placeholder="Escribe tu consulta aquí..."></textarea>


<button type="submit">
Enviar
</button>

</form>

</div>

</div>
<footer class="footer">

<p>Desarrollado por: González Rivera Diana Laura</p>

<p>Materia: Desarrollo Web</p>

<p>2026</p>

</footer>

</body>
</html>
